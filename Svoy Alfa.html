<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Свой Альфа · Людмила</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --alfa-red:#EF3124;
    --alfa-red-dark:#D42A1F;
    --alfa-black:#0D0D0F;
    --ink:#111114;
    --ink-2:#3A3A42;
    --ink-3:#6B6B75;
    --line:#E9E9ED;
    --line-2:#F1F1F4;
    --bg:#FFFFFF;
    --bg-2:#F7F7F8;
    --bg-3:#FBF5F3;
    --success:#10B67A;
    --radius-lg:24px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow-sm:0 1px 2px rgba(13,13,15,.04), 0 2px 8px rgba(13,13,15,.04);
    --shadow-md:0 4px 14px rgba(13,13,15,.06), 0 12px 32px rgba(13,13,15,.06);
    --shadow-lg:0 10px 40px rgba(239,49,36,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
    color:var(--ink);
    background:var(--bg);
    font-size:16px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  #root{max-width:480px;margin:0 auto;position:relative;background:var(--bg);min-height:100vh;padding-bottom:112px;overflow:hidden}
  @media (min-width:520px){
    body{background:linear-gradient(180deg,#f4f4f6,#eceef2);padding:24px 0}
    #root{box-shadow:0 20px 60px rgba(0,0,0,.12);border-radius:28px}
  }
  /* Reveal on scroll */
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  .stagger > * { transition-delay: var(--d, 0ms); }
  /* Buttons tap feedback */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    width:100%;height:56px;border-radius:16px;border:0;
    font-weight:700;font-size:16px;letter-spacing:-.01em;
    cursor:pointer;transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    padding:0 18px;
  }
  .btn:active{transform:scale(.985)}
  .btn-primary{background:var(--alfa-red);color:#fff;box-shadow:var(--shadow-lg)}
  .btn-primary:hover{background:var(--alfa-red-dark)}
  .btn-dark{background:var(--alfa-black);color:#fff}
  .btn-dark:hover{background:#1e1e22}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:#d6d6dc;background:#fafafb}
  /* Section */
  section{padding:28px 20px}
  section h2{
    font-size:26px;line-height:1.15;letter-spacing:-.02em;
    font-weight:800;margin:0 0 10px;
  }
  section p.lead{color:var(--ink-2);margin:0 0 18px;font-size:15px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--alfa-red);background:rgba(239,49,36,.08);
    padding:6px 10px;border-radius:999px;margin-bottom:14px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--alfa-red);box-shadow:0 0 0 4px rgba(239,49,36,.18);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(239,49,36,.18)}50%{box-shadow:0 0 0 8px rgba(239,49,36,0)}}
  /* Sticky bottom bar */
  .sticky-bar-wrap{
    position:fixed;left:0;right:0;bottom:14px;z-index:50;
    display:flex;justify-content:center;pointer-events:none;padding:0 14px;
  }
  .sticky-bar{
    pointer-events:auto;
    width:100%;max-width:452px;
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    padding:8px;background:rgba(13,13,15,.92);
    backdrop-filter:saturate(160%) blur(14px);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-radius:22px;box-shadow:0 10px 40px rgba(0,0,0,.25);
  }
  .sticky-bar a{
    display:flex;align-items:center;justify-content:center;gap:8px;
    height:48px;border-radius:16px;color:#fff;font-weight:600;font-size:14.5px;
    transition:background .2s ease, transform .15s ease;
  }
  .sticky-bar a.call{background:rgba(255,255,255,.08)}
  .sticky-bar a.tg{background:var(--alfa-red)}
  .sticky-bar a:active{transform:scale(.97)}
  .sticky-bar a.call:hover{background:rgba(255,255,255,.14)}
  .sticky-bar a.tg:hover{background:var(--alfa-red-dark)}
</style>
</head>
<body>
<div id="root"></div>

</body>
</html>
